# Template: GitLab CI for sanitised single-commit publishing to GitHub.
#
# Copy this to your repo as `.gitlab-ci.yml` and adapt. Requires:
#   - two runners tagged `internal` (DNS-gapped) and `external` (egress);
#   - GitLab CI variables GITHUB_USERNAME and GITHUB_TOKEN (token: contents
#     write; + repo-creation scope if you want the job to self-create repos).
#
# Model: the `check` stage runs untrusted build steps on the DNS-gapped runner;
# the manual `publish` stage runs ONLY on the egress runner and force-pushes a
# single squashed orphan commit (no GitLab history, CI config stripped) to
# GitHub. See docs/ci-publishing.md for the why.

stages:
  - check
  - publish

# ----- check stage (DNS-gapped runner) -----

# Add your own lint/test jobs here, all tagged [internal]. Example:
# shellcheck:
#   stage: check
#   tags: [internal]
#   script:
#     - shellcheck src/*.sh

sanitisation-gate:
  stage: check
  tags: [internal]
  script:
    - sh scripts/sanitisation-gate.sh .sanitisation-patterns

# ----- publish stage (egress runner, manual) -----

publish-to-github:
  stage: publish
  tags: [external]
  when: manual
  variables:
    GIT_STRATEGY: none
    GIT_AUTHOR_NAME: "Your Name"
    GIT_AUTHOR_EMAIL: "you@example.com"
    GIT_COMMITTER_NAME: "Your Name"
    GIT_COMMITTER_EMAIL: "you@example.com"
  script:
    - test -n "$GITHUB_USERNAME" || { echo "GITHUB_USERNAME not set"; exit 1; }
    - test -n "$GITHUB_TOKEN"    || { echo "GITHUB_TOKEN not set"; exit 1; }
    # Create the GitHub repo if missing (needs repo-creation scope on the token).
    - |
      code=$(curl -s -o /dev/null -w '%{http_code}' \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        "https://api.github.com/repos/${GITHUB_USERNAME}/${CI_PROJECT_NAME}")
      if [ "$code" = "404" ]; then
        curl -sSf -X POST -H "Authorization: token ${GITHUB_TOKEN}" \
          https://api.github.com/user/repos \
          -d "{\"name\":\"${CI_PROJECT_NAME}\",\"private\":false}" >/dev/null
      elif [ "$code" != "200" ]; then
        echo "Unexpected status $code checking repo existence"; exit 1
      fi
    # Shallow checkout, strip CI config, squash to one orphan commit, force-push.
    - rm -rf repo
    - git clone --depth 1 "http://gitlab:80/${CI_PROJECT_PATH}.git" repo
    - cd repo
    - srcsha=$(git rev-parse --short HEAD)
    - rm -rf .git
    - rm -f .gitlab-ci.yml
    - git init -q -b main
    - git add -A
    - 'git commit -q -m "${CI_PROJECT_NAME}: public snapshot $(date +%Y-%m-%d)" -m "source ${srcsha}"'
    - git push --force
        "https://oauth2:${GITHUB_TOKEN}@github.com/${GITHUB_USERNAME}/${CI_PROJECT_NAME}.git"
        main
