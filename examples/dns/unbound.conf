# Unbound recursive resolver (template). Binds a LOOPBACK ALIAS, not a NIC IP,
# so DNS is up before the network and survives link changes. Serves LAN + VPN
# + containers, with a blocklist include.
server:
    interface: 127.0.0.11           # dedicated loopback alias for the resolver
    port: 53
    do-ip6: no
    access-control: 127.0.0.0/8 allow
    access-control: 192.0.2.0/24 allow      # management LAN (example)
    access-control: 198.51.100.0/24 allow   # VPN (example)
    access-control: 203.0.113.0/24 allow    # docker bridges (example)
    access-control: 0.0.0.0/0 refuse
    hide-identity: yes
    hide-version: yes
    prefetch: yes
    # Blocklist of known-bad domains (generate to local-zone entries):
    include: "/etc/unbound/blocklist.conf"

# Split-horizon: internal names -> internal addresses.
# local-zone: "lab.example.com." static
# local-data: "site.lab.example.com. A 192.0.2.10"
